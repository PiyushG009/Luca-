<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Luca - The Music Player</title>
  <link rel="stylesheet" href="web.css" />
</head>
<body>

  <!-- Auth Overlay -->
  <div id="authOverlay" class="auth-overlay" style="display: flex;">
    <div class="auth-card">
      <h1 class="auth-logo">Luca</h1>
      <h2 id="authTitle">Log in to continue</h2>
      <form id="authForm">
        <input type="text" id="authName" placeholder="Your Name" required />
        <input type="email" id="authEmail" placeholder="Email address" required />
        <input type="password" id="authPassword" placeholder="Password" required />
        <button type="submit" class="auth-submit-btn">Continue</button>
      </form>
      <div class="auth-divider"><span>or</span></div>
      <button type="button" id="googleAuthBtn" class="google-btn">
        <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="G" />
        Continue with Google
      </button>
    </div>
  </div>

  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="logo">
        <h1>Luca</h1>
        <p>The Music Player</p>
      </div>
      <ul class="nav-links">
        <li id="homeBtn" class="active"><span class="icon">🏠</span> Home</li>
        <li id="searchBtn"><span class="icon">🔍</span> Search</li>
        <li id="historyBtn"><span class="icon">🕒</span> Recently Played</li>
      </ul>
      <div class="divider"></div>
      <ul class="nav-links small">
        <li id="likedSongsBtn"><span class="icon">❤️</span> Liked Songs</li>
      </ul>
      <div class="sidebar-playlists">
        <p>Top Hindi</p>
        <p>Punjabi Hits</p>
        <p>Party Mix</p>
        <p>Lo-Fi Beats</p>
        <p>Global Top 50</p>
      </div>
    </nav>

    <!-- Main View -->
    <main class="main-view">
      <header class="top-bar">
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="What do you want to listen to?" autocomplete="off" />
        </div>
        <div class="user-profile" id="userProfile" title="Logout">
          <span id="userInitial">U</span>
        </div>
      </header>
      
      <div class="content-scroll" id="contentScroll">
        <div id="loadingIndicator" class="loading-indicator" style="display: none;">Loading...</div>
        
        <!-- Home View for Posters -->
        <div id="homeView">
          <h2 id="homeTitle" class="section-title">Trending Now</h2>
          <div id="posterGrid" class="cards-grid"></div>
        </div>

        <!-- Search View for List -->
        <div id="searchView" style="display: none;">
          <h2 id="searchTitle" class="section-title">Search Results</h2>
          <div class="track-list-header">
            <div class="col-index">#</div>
            <div class="col-title">Title</div>
            <div class="col-artist">Artist</div>
            <div class="col-like"></div>
            <div class="col-time">⏱</div>
          </div>
          <div id="playlistList" class="track-list"></div>
        </div>

        <!-- Infinite Scroll Loader marker -->
        <div id="bottomLoader" style="height: 20px; text-align: center; color: var(--accent-1); margin-top:20px; display:none;">Loading more...</div>
      </div>
    </main>
  </div>

  <!-- Bottom Player Bar -->
  <footer class="player-bar">
    <div class="now-playing-info">
      <img id="cover" class="cover-small" src="https://picsum.photos/300?random=10" alt="Cover" />
      <div class="meta-small">
        <div id="trackTitle" class="title-small">Track Title</div>
        <div id="trackArtist" class="artist-small">Artist</div>
      </div>
      <button id="nowPlayingLikeBtn" class="like-btn" title="Save to Liked Songs">🤍</button>
    </div>

    <div class="player-controls-center">
      <div class="controls">
        <button id="shuffleBtn" class="btn icon-btn" title="Shuffle">🔀</button>
        <button id="prevBtn" class="btn icon-btn" title="Previous">⏮</button>
        <button id="playPauseBtn" class="btn primary-btn" title="Play">▶</button>
        <button id="nextBtn" class="btn icon-btn" title="Next">⏭</button>
        <button id="repeatBtn" class="btn icon-btn" title="Repeat">🔁</button>
      </div>
      <div class="progress-wrap">
        <span id="currentTime">0:00</span>
        <div id="progressContainer" class="progress-container">
          <div id="progress" class="progress"></div>
        </div>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="vol-container">
      <button id="muteBtn" class="btn icon-btn" title="Mute">🔈</button>
      <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
    </div>
  </footer>

  <audio id="audio" preload="metadata"></audio>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="web.js"></script>
</body>
</html>
